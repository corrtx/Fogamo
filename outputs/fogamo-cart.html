<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fogamo | Кошик</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #241815;
      --muted: #6d5750;
      --card: rgba(255, 255, 255, 0.98);
      --line: rgba(36, 24, 21, 0.08);
      --accent: #a1552d;
      --accent-dark: #733518;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fffdfb 0%, #ffffff 100%);
      min-height: 100vh;
    }
    .panel {
      opacity: 0;
      transform: translateY(54px) scale(0.98);
      animation: floatUp 1.05s cubic-bezier(.16,.84,.24,1) forwards;
    }
    .page {
      width: 100%;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
    }
    .panel {
      width: 100vw;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(circle at top left, rgba(255, 240, 216, 0.55), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(182, 98, 59, 0.08), transparent 24%),
        #fff;
    }
    .content {
      width: min(920px, 100%);
      text-align: center;
    }
    .crumbs {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 38px;
      flex-direction: column;
    }
    .top-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid rgba(36, 24, 21, 0.14);
      text-decoration: none;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.8);
      white-space: nowrap;
      transform: translateY(-2px);
      transition: transform 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
    }
    .top-link:hover,
    .button:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 22px 42px rgba(115, 53, 24, 0.16);
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent-dark);
      font-size: 0.88rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0;
    }
    .eyebrow::before {
      content: "";
      width: 38px;
      height: 1px;
      background: currentColor;
    }
    h1 {
      margin: 0 0 16px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.4rem, 6vw, 6.5rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
    }
    p {
      margin: 0 auto 34px;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.15rem;
      line-height: 1.95;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 26px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: #fff8f0;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 16px 34px rgba(115, 53, 24, 0.18);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(54px) scale(0.98); }
      65% { opacity: 1; transform: translateY(-8px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 720px) {
      .panel { padding: 28px 18px; }
      .crumbs { flex-direction: column; gap: 12px; margin-bottom: 28px; }
      h1 { font-size: 3rem; }
      p { font-size: 1.02rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="content">
        <div class="crumbs">
          <a class="top-link" href="/">На головну</a>
          <div class="eyebrow">Кошик</div>
        </div>
        <h1>Тут поки що порожньо</h1>
        <p>Час додати трохи турботи про себе</p>
        <a class="button" href="/catalog">До каталогу</a>
      </div>
    </section>
  </div>
</body>
</html>
