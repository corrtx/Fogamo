<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1600" viewBox="0 0 1400 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf1df"/>
      <stop offset="45%" stop-color="#efe0c7"/>
      <stop offset="100%" stop-color="#d7b98f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="38%">
      <stop offset="0%" stop-color="#ffd99a" stop-opacity="0.72"/>
      <stop offset="55%" stop-color="#f5b96b" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f5b96b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8ed" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f2e0c5" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#6f4a25" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1400" height="1600" fill="url(#bg)"/>
  <ellipse cx="700" cy="560" rx="380" ry="520" fill="url(#glow)" filter="url(#soft)"/>

  <rect x="110" y="100" width="1180" height="1400" rx="48" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)"/>
  <rect x="170" y="150" width="1060" height="1300" rx="36" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.38)"/>

  <g transform="translate(170, 120)">
    <text x="0" y="70" fill="#3d2a1f" font-family="Cormorant Garamond, Georgia, serif" font-size="72" letter-spacing="2">Fogamo</text>
    <text x="0" y="120" fill="#7d6250" font-family="Manrope, Arial, sans-serif" font-size="26" letter-spacing="4">Niche perfume concept</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="368" y="250" width="664" height="1030" rx="56" fill="url(#panel)" stroke="rgba(124,84,50,0.18)"/>
    <rect x="430" y="310" width="540" height="910" rx="40" fill="rgba(255,255,255,0.18)"/>
    <image href="fogamo-ember-nights.png" x="430" y="290" width="540" height="940" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g>
    <rect x="170" y="1310" width="520" height="180" rx="28" fill="#fff6ea" fill-opacity="0.86" stroke="rgba(110,74,42,0.12)"/>
    <text x="210" y="1375" fill="#34221a" font-family="Cormorant Garamond, Georgia, serif" font-size="42" letter-spacing="2">EMBER NIGHTS</text>
    <text x="210" y="1422" fill="#7c6353" font-family="Manrope, Arial, sans-serif" font-size="22" letter-spacing="4">FOGAMO</text>
    <rect x="170" y="1510" width="260" height="54" rx="27" fill="#281916"/>
    <text x="300" y="1545" text-anchor="middle" fill="#fff5ef" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3">БЕСТСЕЛЛЕР 2026</text>
  </g>

  <g>
    <text x="870" y="1390" fill="#5b4637" font-family="Manrope, Arial, sans-serif" font-size="23">Мягкая аура вокруг флакона</text>
    <text x="870" y="1430" fill="#5b4637" font-family="Manrope, Arial, sans-serif" font-size="23">и улучшенная визуальная подача</text>
    <text x="870" y="1470" fill="#5b4637" font-family="Manrope, Arial, sans-serif" font-size="23">для hero-блока сайта Fogamo.</text>
  </g>
</svg>
